# Compose stack for the APRP database mirror host.
# Mirror hostnames come from config, not from literals in this file.

services:
  db-mirror:
    image: mariadb:10.11
    restart: unless-stopped
    container_name: >-
      ${APRP_MIRROR_CONTAINER_NAME:?APRP_MIRROR_CONTAINER_NAME is
      required}
    env_file:
      - ${APRP_COMPOSE_ENV_FILE:-.env.mirror}
    environment:
      APRP_GALERA_NODE: db-mirror
      APRP_GALERA_CLUSTER_NAME: >-
        ${APRP_GALERA_CLUSTER_NAME:?APRP_GALERA_CLUSTER_NAME is required}
      APRP_GALERA_CLUSTER_MEMBERS: >-
        ${APRP_GALERA_CLUSTER_MEMBERS:?APRP_GALERA_CLUSTER_MEMBERS is
        required}
      APRP_GALERA_PRIMARY_HOST: >-
        ${APRP_GALERA_PRIMARY_HOST:?APRP_GALERA_PRIMARY_HOST is required}
      APRP_GALERA_FORCE_BOOTSTRAP: >-
        ${APRP_GALERA_FORCE_BOOTSTRAP:?APRP_GALERA_FORCE_BOOTSTRAP is
        required}
    volumes:
      - db-mirror-data:/var/lib/mysql
      - ./ops/galera_mysqld_base.cnf:/etc/mysql/conf.d/aprp_galera_base.cnf:ro
      - type: bind
        source: ./ops/mariadb_galera_entrypoint.sh
        target: /usr/local/bin/galera-entrypoint.sh
        read_only: true
    entrypoint:
      - /bin/bash
      - /usr/local/bin/galera-entrypoint.sh
    networks:
      - mirror-net
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          out="$$(MYSQL_PWD="$$MYSQL_ROOT_PASSWORD" mariadb -uroot -Nse
          "SHOW GLOBAL STATUS WHERE Variable_name IN
          ('wsrep_ready','wsrep_cluster_status')")"
          && printf '%s\n' "$$out" | grep -F 'wsrep_ready' | grep -q ON
          && printf '%s\n' "$$out" | grep -F 'wsrep_cluster_status'
          | grep -q Primary || exit 1
      interval: 5s
      timeout: 5s
      retries: 48
      start_period: 600s

volumes:
  db-mirror-data:

networks:
  mirror-net:
